name: Daily AI Digest

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC = 8am Lisbon (WEST, UTC+1, Apr-Oct)
  workflow_dispatch:       # manual "Run workflow" button in GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Fetch feed (X + podcasts + RSS)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: node scripts/fetch-my-feed.js

      - name: Debug feed contents
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('my-feed.json', 'utf8'));
            console.log('xBuilders:', d.x?.length, '| podcasts:', d.podcasts?.length, '| rssFeeds:', d.rss?.length, '| errors:', d.errors?.length ?? 0);
          "

      - name: Generate digest (Claude)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cat my-feed.json | node scripts/remix-digest.js

      - name: Build slide deck
        run: node scripts/generate-slides.js

      - name: Commit and push
        run: |
          git config user.name "AI Digest Bot"
          git config user.email "bot@ai-digest.local"
          git add index.html digest-draft.json
          git diff --staged --quiet || git commit -m "digest: $(date +%Y-%m-%d)"
          git push

      - name: Send Telegram notification
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=☀️ Your Daily Digest is ready:
          https://pedro-ux.github.io/ai-digest" || true
