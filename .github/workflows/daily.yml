name: Daily AI Digest

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC = 8am Lisbon (WEST, UTC+1, Apr-Oct)
  workflow_dispatch:       # manual "Run workflow" button in GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone follow-builders
        run: git clone https://github.com/zarazhangrui/follow-builders.git /tmp/follow-builders

      - name: Install follow-builders dependencies
        run: cd /tmp/follow-builders/scripts && npm install

      - name: Install local script dependencies
        run: |
          cd scripts && npm install

      - name: Fetch my X feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          node scripts/fetch-my-feed.js

      - name: Fetch podcast feed
        env:
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          cd /tmp/follow-builders/scripts
          node generate-feed.js --podcasts-only

      - name: Generate slide deck
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node --input-type=module -e "import { readFile } from 'fs/promises'; const myFeed = JSON.parse(await readFile('my-feed.json', 'utf8')); const podcastFeed = JSON.parse(await readFile('/tmp/follow-builders/feed-podcasts.json', 'utf8')); const merged = { ...myFeed, podcasts: podcastFeed.podcasts || [], stats: { ...(myFeed.stats || {}), podcastEpisodes: (podcastFeed.podcasts || []).length }, generatedAt: myFeed.generatedAt || podcastFeed.generatedAt }; process.stdout.write(JSON.stringify(merged));" | node scripts/remix-digest.js | node scripts/generate-slides.js
          cp ~/.follow-builders/digest-latest.html $GITHUB_WORKSPACE/index.html

      - name: Commit and push index.html
        run: |
          git config user.name "AI Digest Bot"
          git config user.email "bot@ai-digest.local"
          git add index.html
          git diff --staged --quiet || git commit -m "digest: $(date +%Y-%m-%d)"
          git push

      - name: Send Telegram notification
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=☀️ Your AI Builders Digest is ready:
          https://pedro-ux.github.io/ai-digest"
