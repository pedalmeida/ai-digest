<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Digest — Sources</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #F5F0E8;
  --surface:     #FEFCF8;
  --surface-2:   #F9F5EE;
  --border:      #E2D9C8;
  --border-soft: #EDE6D8;
  --text:        #1A1208;
  --text-2:      #4A3F2E;
  --muted:       #8A7B66;
  --subtle:      #F2EDE3;

  --ai:          #D97706;
  --ai-bg:       #FFFBEB;
  --ai-border:   #FDE68A;
  --tech:        #7C3AED;
  --tech-bg:     #F5F3FF;
  --tech-border: #DDD6FE;
  --pt:          #16803C;
  --pt-bg:       #F0FDF4;
  --pt-border:   #BBF7D0;
  --world:       #1D4ED8;
  --world-bg:    #EFF6FF;
  --world-border:#BFDBFE;

  --danger:      #DC2626;
  --danger-bg:   #FEF2F2;

  --accent:      #C96F3B;
  --accent-dark: #9F4E25;

  --shadow:      0 2px 12px rgba(26,18,8,0.07), 0 1px 3px rgba(26,18,8,0.05);
  --shadow-lg:   0 8px 40px rgba(26,18,8,0.1), 0 2px 8px rgba(26,18,8,0.06);
  --shadow-pop:  0 16px 60px rgba(26,18,8,0.14), 0 4px 16px rgba(26,18,8,0.08);

  --radius:      16px;
  --radius-sm:   10px;
  --sidebar:     300px;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ── Shell ── */
.shell {
  display: grid;
  grid-template-columns: var(--sidebar) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  grid-column: 1 / -1;
  padding: 28px 32px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: baseline;
  gap: 20px;
  flex-wrap: wrap;
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1;
}

.header-title em {
  font-style: italic;
  color: var(--accent);
}

.header-sub {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
  margin-left: auto;
}

#status-global {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--subtle);
  color: var(--muted);
  border: 1px solid var(--border-soft);
  transition: all 0.25s;
  white-space: nowrap;
}

#status-global.ok    { background: #F0FDF4; color: #15803D; border-color: #BBF7D0; }
#status-global.error { background: var(--danger-bg); color: var(--danger); border-color: #FECACA; }
#status-global.busy  { background: #FFFBEB; color: var(--ai); border-color: var(--ai-border); }

/* ── Sidebar ── */
.sidebar {
  padding: 24px 20px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: sticky;
  top: 0;
  height: calc(100vh - 89px);
  overflow-y: auto;
  scrollbar-width: thin;
}

.panel {
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 18px;
}

.panel-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-title::before {
  content: '';
  display: block;
  width: 14px;
  height: 1px;
  background: var(--border);
}

/* ── Form elements ── */
.field { display: flex; flex-direction: column; gap: 5px; }

label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-2);
  text-transform: uppercase;
}

input, select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font: inherit;
  font-size: 13px;
  transition: border-color 0.15s, box-shadow 0.15s;
  appearance: none;
}

input::placeholder { color: var(--muted); }

input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,111,59,0.12);
}

input[type="password"] { font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }

/* ── Buttons ── */
button {
  border: none;
  border-radius: 100px;
  padding: 9px 16px;
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s, box-shadow 0.12s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

button:hover:not(:disabled) { transform: translateY(-1px); }
button:active:not(:disabled) { transform: translateY(0); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #FFF9F1;
  box-shadow: 0 2px 8px rgba(201,111,59,0.3);
}

.btn-primary:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(201,111,59,0.4); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}

.btn-ghost:hover:not(:disabled) { background: var(--subtle); }

.btn-danger-ghost {
  background: transparent;
  color: var(--danger);
  border: 1px solid #FECACA;
  font-size: 11px;
  padding: 5px 10px;
}

.btn-danger-ghost:hover:not(:disabled) { background: var(--danger-bg); }

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── Sub-form toggle ── */
.form-toggle {
  display: flex;
  background: var(--subtle);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 2px;
  gap: 2px;
  margin-bottom: 14px;
}

.toggle-btn {
  flex: 1;
  padding: 6px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}

.toggle-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow);
}

.sub-form { display: none; }
.sub-form.active { display: flex; flex-direction: column; gap: 10px; }

/* ── Main area ── */
.main {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 0;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px;
  align-self: flex-start;
  flex-wrap: wrap;
}

.tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  transition: all 0.2s;
  white-space: nowrap;
}

.tab:hover:not(.active) { background: var(--subtle); color: var(--text-2); transform: none; }

.tab.active { color: #fff; }
.tab[data-tab="ai"].active     { background: var(--ai);    box-shadow: 0 2px 12px rgba(217,119,6,0.35); }
.tab[data-tab="tech"].active   { background: var(--tech);  box-shadow: 0 2px 12px rgba(124,58,237,0.35); }
.tab[data-tab="pt"].active     { background: var(--pt);    box-shadow: 0 2px 12px rgba(22,128,60,0.35); }
.tab[data-tab="world"].active  { background: var(--world); box-shadow: 0 2px 12px rgba(29,78,216,0.35); }

.tab-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 100px;
  background: rgba(255,255,255,0.25);
  min-width: 20px;
  text-align: center;
  transition: all 0.2s;
}

.tab:not(.active) .tab-count {
  background: var(--border-soft);
  color: var(--muted);
}

/* ── Grid toolbar ── */
.grid-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.search-wrap {
  flex: 1;
  min-width: 180px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

.search-wrap input {
  padding-left: 36px;
}

#count-label {
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 4px;
}

.section-icon {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.section-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: -0.01em;
}

.section-desc { font-size: 12px; color: var(--muted); margin-top: 1px; }

/* Section accent per tab */
.tab-ai    .section-icon { background: var(--ai-bg); border: 1px solid var(--ai-border); }
.tab-tech  .section-icon { background: var(--tech-bg); border: 1px solid var(--tech-border); }
.tab-pt    .section-icon { background: var(--pt-bg); border: 1px solid var(--pt-border); }
.tab-world .section-icon { background: var(--world-bg); border: 1px solid var(--world-border); }

.tab-ai    .section-name { color: var(--ai); }
.tab-tech  .section-name { color: var(--tech); }
.tab-pt    .section-name { color: var(--pt); }
.tab-world .section-name { color: var(--world); }

/* ── Cards grid ── */
#cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
  animation: cardIn 0.22s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
  border-color: var(--border);
}

.card-remove {
  position: absolute;
  top: 10px; right: 10px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
}

.card:hover .card-remove { opacity: 1; }
.card-remove:hover {
  background: var(--danger-bg) !important;
  color: var(--danger) !important;
  transform: none !important;
}

/* X Account card */
.card-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  background: var(--subtle);
}

.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
  color: var(--text);
  padding-right: 24px;
}

.card-handle, .card-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.card-url {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 100px;
  border: 1px solid;
  align-self: flex-start;
}

.badge-ai    { color: var(--ai);    background: var(--ai-bg);    border-color: var(--ai-border); }
.badge-tech  { color: var(--tech);  background: var(--tech-bg);  border-color: var(--tech-border); }
.badge-pt    { color: var(--pt);    background: var(--pt-bg);    border-color: var(--pt-border); }
.badge-world { color: var(--world); background: var(--world-bg); border-color: var(--world-border); }
.badge-channel  { color: var(--accent); background: #FFF7ED; border-color: #FED7AA; }
.badge-playlist { color: var(--tech);   background: var(--tech-bg); border-color: var(--tech-border); }
.badge-rss  { color: var(--pt); background: var(--pt-bg); border-color: var(--pt-border); }

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.4);
}

.empty-state p { font-size: 14px; margin-top: 8px; }

/* ── Save bar ── */
.save-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  flex-wrap: wrap;
}

.save-hint { font-size: 12px; color: var(--muted); }
.save-hint strong { color: var(--text-2); }

/* ── Responsive ── */
@media (max-width: 860px) {
  .shell { grid-template-columns: 1fr; }
  .header { padding: 16px; }
  .sidebar {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 16px;
    padding: 16px;
  }
  .sidebar > .panel { flex: 1 1 280px; }
  .main { padding: 16px; }
  .tabs { width: 100%; justify-content: stretch; }
  .tab { flex: 1; justify-content: center; }
}

/* Divider between card groups */
.group-label {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

.group-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-soft);
}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <h1 class="header-title">AI Digest — <em>Sources</em></h1>
    <span class="header-sub">Changes saved here take effect tomorrow at 8am</span>
    <span id="status-global">Loading…</span>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Token panel -->
    <div class="panel">
      <p class="panel-title">GitHub token</p>
      <div class="field">
        <label for="token">Personal access token</label>
        <input id="token" type="password" autocomplete="off" placeholder="ghp_…">
      </div>
      <p style="font-size:11px;color:var(--muted);margin:8px 0 12px;line-height:1.5">Stored in <code style="font-family:'DM Mono',monospace;font-size:10px">localStorage</code> only. Needs <code style="font-family:'DM Mono',monospace;font-size:10px">repo</code> scope.</p>
      <div class="btn-row">
        <button id="save-token" class="btn-ghost" style="font-size:12px;padding:7px 12px">Save</button>
        <button id="clear-token" class="btn-ghost" style="font-size:12px;padding:7px 12px">Clear</button>
      </div>
    </div>

    <!-- Add source panel -->
    <div class="panel" id="add-panel">
      <p class="panel-title" id="add-panel-title">Add to AI</p>
      <div id="add-form-container"></div>
    </div>

    <!-- Save -->
    <div class="save-bar">
      <span class="save-hint" id="save-hint">No unsaved changes</span>
      <button id="save-btn" class="btn-primary" disabled>Saved</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="ai">
        <span>🤖</span> AI
        <span class="tab-count" id="count-ai">0</span>
      </button>
      <button class="tab" data-tab="tech">
        <span>⚙️</span> Tech
        <span class="tab-count" id="count-tech">0</span>
      </button>
      <button class="tab" data-tab="pt">
        <span>🇵🇹</span> PT News
        <span class="tab-count" id="count-pt">0</span>
      </button>
      <button class="tab" data-tab="world">
        <span>🌍</span> World News
        <span class="tab-count" id="count-world">0</span>
      </button>
    </div>

    <!-- Toolbar -->
    <div class="grid-toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search" type="search" placeholder="Search sources…">
      </div>
      <span id="count-label">— sources</span>
    </div>

    <!-- Section header -->
    <div id="section-header"></div>

    <!-- Cards -->
    <div id="cards"></div>

  </main>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────
const STORAGE_KEY   = 'ai-digest-github-pat';
const REPO_OWNER    = 'pedro-ux';
const REPO_NAME     = 'ai-digest';
const FILE_PATH     = 'scripts/my-sources.json';
const CONTENTS_URL  = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

const TAB_META = {
  ai:    { label: 'AI Builders',  emoji: '🤖', color: 'var(--ai)',    desc: 'X accounts + podcasts tracked for AI insights' },
  tech:  { label: 'Tech',         emoji: '⚙️',  color: 'var(--tech)',  desc: 'X accounts + RSS feeds for general tech' },
  pt:    { label: 'PT News',      emoji: '🇵🇹', color: 'var(--pt)',    desc: 'Portuguese news RSS feeds' },
  world: { label: 'World News',   emoji: '🌍',  color: 'var(--world)', desc: 'Global news RSS feeds' },
};

// ── State ─────────────────────────────────────────────────────────
const state = {
  sources: { x_accounts: [], podcasts: [], rss_feeds: [] },
  remoteSha: '',
  activeTab: 'ai',
  filter: '',
  dirty: false,
  saving: false,
  addMode: {},  // per-tab toggle: 'x' | 'podcast' | 'rss'
};

// ── Helpers ───────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status-global');
  el.textContent = msg;
  el.className = type;
}

function setDirty(val) {
  state.dirty = val;
  const hint = document.getElementById('save-hint');
  const btn  = document.getElementById('save-btn');
  if (val) {
    hint.innerHTML = '<strong>Unsaved changes</strong> — save to apply tomorrow';
    btn.textContent = 'Save changes';
    btn.disabled = false;
  } else {
    hint.textContent = 'No unsaved changes';
    btn.textContent = 'Saved';
    btn.disabled = true;
  }
}

function sanitizeHandle(v) {
  return String(v || '').trim()
    .replace(/^https?:\/\/(www\.)?x\.com\//i, '')
    .replace(/^@+/, '')
    .replace(/\/.*$/, '')
    .replace(/[^A-Za-z0-9_]/g, '')
    .toLowerCase();
}

function getToken() { return localStorage.getItem(STORAGE_KEY) || ''; }

// ── Tab counts ────────────────────────────────────────────────────
function getTabSources(tab) {
  const { x_accounts, podcasts, rss_feeds } = state.sources;
  if (tab === 'ai')    return [...x_accounts.filter(a => (a.category || 'ai') === 'ai'), ...podcasts];
  if (tab === 'tech')  return [...x_accounts.filter(a => a.category === 'tech'), ...rss_feeds.filter(f => f.category === 'tech')];
  if (tab === 'pt')    return rss_feeds.filter(f => f.category === 'pt_news');
  if (tab === 'world') return rss_feeds.filter(f => f.category === 'world_news');
  return [];
}

function updateCounts() {
  ['ai','tech','pt','world'].forEach(t => {
    document.getElementById('count-' + t).textContent = getTabSources(t).length;
  });
}

// ── Section header ────────────────────────────────────────────────
function renderSectionHeader(tab) {
  const m = TAB_META[tab];
  document.getElementById('section-header').innerHTML = `
    <div class="section-header tab-${tab}">
      <div class="section-icon">${m.emoji}</div>
      <div>
        <div class="section-name">${m.label}</div>
        <div class="section-desc">${m.desc}</div>
      </div>
    </div>`;
}

// ── Cards ─────────────────────────────────────────────────────────
function renderXCard(acc) {
  const card = document.createElement('article');
  card.className = 'card';
  const catClass = acc.category === 'tech' ? 'badge-tech' : 'badge-ai';
  const catLabel = acc.category === 'tech' ? 'Tech' : 'AI';
  card.innerHTML = `
    <button class="card-remove" title="Remove">×</button>
    <img class="card-avatar" src="https://unavatar.io/twitter/${encodeURIComponent(acc.handle)}"
         alt="" onerror="this.style.display='none'">
    <div class="card-name">${esc(acc.name || acc.handle)}</div>
    <div class="card-handle">@${esc(acc.handle)}</div>
    <span class="badge ${catClass}">${catLabel}</span>`;
  card.querySelector('.card-remove').addEventListener('click', () => {
    state.sources.x_accounts = state.sources.x_accounts.filter(a => a.handle !== acc.handle);
    setDirty(true);
    renderCurrentTab();
  });
  return card;
}

function renderPodcastCard(pod) {
  const card = document.createElement('article');
  card.className = 'card';
  const isPlaylist = pod.type === 'youtube_playlist';
  const idText = isPlaylist ? (pod.playlistId || '') : (pod.channelHandle || '');
  const badgeClass = isPlaylist ? 'badge-playlist' : 'badge-channel';
  const badgeLabel = isPlaylist ? 'Playlist' : 'Channel';
  card.innerHTML = `
    <button class="card-remove" title="Remove">×</button>
    <div style="font-size:24px">🎙️</div>
    <div class="card-name">${esc(pod.name)}</div>
    <span class="badge ${badgeClass}">${badgeLabel}</span>
    <div class="card-sub">${esc(idText)}</div>`;
  card.querySelector('.card-remove').addEventListener('click', () => {
    state.sources.podcasts = state.sources.podcasts.filter(p => p.name !== pod.name);
    setDirty(true);
    renderCurrentTab();
  });
  return card;
}

function renderRSSCard(feed) {
  const card = document.createElement('article');
  card.className = 'card';
  card.innerHTML = `
    <button class="card-remove" title="Remove">×</button>
    <div style="font-size:24px">📡</div>
    <div class="card-name">${esc(feed.name)}</div>
    <span class="badge badge-rss">RSS</span>
    <div class="card-url" title="${esc(feed.url)}">${esc(feed.url)}</div>`;
  card.querySelector('.card-remove').addEventListener('click', () => {
    state.sources.rss_feeds = state.sources.rss_feeds.filter(f => !(f.name === feed.name && f.url === feed.url));
    setDirty(true);
    renderCurrentTab();
  });
  return card;
}

function renderCurrentTab() {
  const tab = state.activeTab;
  const query = state.filter.toLowerCase().trim();
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';

  const { x_accounts, podcasts, rss_feeds } = state.sources;

  function matchItem(item) {
    if (!query) return true;
    return ['name','handle','url','channelHandle','playlistId']
      .some(k => item[k] && String(item[k]).toLowerCase().includes(query));
  }

  let total = 0;

  if (tab === 'ai') {
    const xAI = x_accounts.filter(a => (a.category || 'ai') === 'ai').filter(matchItem);
    const pods = podcasts.filter(matchItem);
    if (xAI.length > 0) {
      const gl = document.createElement('div');
      gl.className = 'group-label';
      gl.textContent = 'X Accounts';
      cardsEl.appendChild(gl);
      xAI.forEach(a => cardsEl.appendChild(renderXCard(a)));
    }
    if (pods.length > 0) {
      const gl = document.createElement('div');
      gl.className = 'group-label';
      gl.textContent = 'Podcasts';
      cardsEl.appendChild(gl);
      pods.forEach(p => cardsEl.appendChild(renderPodcastCard(p)));
    }
    total = xAI.length + pods.length;
  }

  if (tab === 'tech') {
    const xTech = x_accounts.filter(a => a.category === 'tech').filter(matchItem);
    const rss   = rss_feeds.filter(f => f.category === 'tech').filter(matchItem);
    if (xTech.length > 0) {
      const gl = document.createElement('div');
      gl.className = 'group-label';
      gl.textContent = 'X Accounts';
      cardsEl.appendChild(gl);
      xTech.forEach(a => cardsEl.appendChild(renderXCard(a)));
    }
    if (rss.length > 0) {
      const gl = document.createElement('div');
      gl.className = 'group-label';
      gl.textContent = 'RSS Feeds';
      cardsEl.appendChild(gl);
      rss.forEach(f => cardsEl.appendChild(renderRSSCard(f)));
    }
    total = xTech.length + rss.length;
  }

  if (tab === 'pt') {
    const feeds = rss_feeds.filter(f => f.category === 'pt_news').filter(matchItem);
    feeds.forEach(f => cardsEl.appendChild(renderRSSCard(f)));
    total = feeds.length;
  }

  if (tab === 'world') {
    const feeds = rss_feeds.filter(f => f.category === 'world_news').filter(matchItem);
    feeds.forEach(f => cardsEl.appendChild(renderRSSCard(f)));
    total = feeds.length;
  }

  if (total === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div style="font-size:28px">🗂️</div><p>${query ? 'No sources match your search.' : 'No sources in this section yet. Add one using the form on the left.'}</p>`;
    cardsEl.appendChild(empty);
  }

  document.getElementById('count-label').textContent = `${total} source${total !== 1 ? 's' : ''}`;
  updateCounts();
  renderSectionHeader(tab);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Add forms ─────────────────────────────────────────────────────

        <button class="toggle-btn ${mode==='podcast'?'active':''}" data-mode="podcast">Podcast</button>

      </div>
      <div class="sub-form ${mode==='podcast'?'active':''}" id="sf-podcast">
        <div class="field"><label>Show name</label><input id="pod-name" placeholder="Latent Space" autocomplete="off"></div>
        <div class="field">
          <label>Type</label>
          <select id="pod-type"><option value="youtube_channel">YouTube Channel</option><option value="youtube_playlist">YouTube Playlist</option></select>
        </div>
        <div class="field" id="pod-id-field"><label id="pod-id-label">Channel Handle</label><input id="pod-id" placeholder="LatentSpacePod" autocomplete="off"></div>
        <button id="add-podcast" class="btn-primary" style="width:100%;justify-content:center">Add Podcast</button>
      </div>`;

    container.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.addMode.ai = btn.dataset.mode;
        renderAddForm('ai');
      });
    });

    document.getElementById('pod-type').addEventListener('change', e => {
      const isPlaylist = e.target.value === 'youtube_playlist';
      document.getElementById('pod-id-label').textContent = isPlaylist ? 'Playlist ID' : 'Channel Handle';
      document.getElementById('pod-id').placeholder = isPlaylist ? 'PLuMcoKK9mKgH…' : 'LatentSpacePod';
    });

    document.getElementById('add-ai-x').addEventListener('click', () => {
      const handle = sanitizeHandle(document.getElementById('ai-handle').value);
      const name   = document.getElementById('ai-name').value.trim() || handle;
      if (!handle) { setStatus('Enter a valid handle', 'error'); return; }
      if (state.sources.x_accounts.some(a => a.handle === handle)) { setStatus(`@${handle} already tracked`, 'error'); return; }
      state.sources.x_accounts.push({ name, handle, category: 'ai' });
      setDirty(true);
      setStatus(`Added @${handle}`, 'ok');
      renderCurrentTab();
      renderAddForm('ai');
    });

    document.getElementById('add-podcast').addEventListener('click', () => {
      const name   = document.getElementById('pod-name').value.trim();
      const type   = document.getElementById('pod-type').value;
      const id     = document.getElementById('pod-id').value.trim();
      if (!name || !id) { setStatus('Fill in all podcast fields', 'error'); return; }
      if (state.sources.podcasts.some(p => p.name === name)) { setStatus(`${name} already exists`, 'error'); return; }
      const entry = { name, type };
      if (type === 'youtube_playlist') entry.playlistId = id;
      else entry.channelHandle = id;
      state.sources.podcasts.push(entry);
      setDirty(true);
      setStatus(`Added podcast: ${name}`, 'ok');
      renderCurrentTab();
      renderAddForm('ai');
    });
  }

  if (tab === 'tech') {
    const mode = state.addMode.tech || 'x';
    container.innerHTML = `
      <div class="form-toggle">
        <button class="toggle-btn ${mode==='x'?'active':''}" data-mode="x">X Account</button>
        <button class="toggle-btn ${mode==='rss'?'active':''}" data-mode="rss">RSS Feed</button>
      </div>
      <div class="sub-form ${mode==='x'?'active':''}" id="sf-x">
        <div class="field"><label>Handle</label><input id="tech-handle" placeholder="@rauchg" autocomplete="off"></div>
        <div class="field"><label>Name (optional)</label><input id="tech-name" placeholder="Guillermo Rauch" autocomplete="off"></div>
        <button id="add-tech-x" class="btn-primary" style="width:100%;justify-content:center">Add Account</button>
      </div>
      <div class="sub-form ${mode==='rss'?'active':''}" id="sf-rss">
        <div class="field"><label>Feed name</label><input id="tech-feed-name" placeholder="TechCrunch" autocomplete="off"></div>
        <div class="field"><label>RSS URL</label><input id="tech-feed-url" placeholder="https://techcrunch.com/feed/" type="url" autocomplete="off"></div>
        <button id="add-tech-rss" class="btn-primary" style="width:100%;justify-content:center">Add Feed</button>

    container.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {

    document.getElementById('add-tech-x').addEventListener('click', () => {
      const handle = sanitizeHandle(document.getElementById('tech-handle').value);
      const name   = document.getElementById('tech-name').value.trim() || handle;
      if (!handle) { setStatus('Enter a valid handle', 'error'); return; }
      if (state.sources.x_accounts.some(a => a.handle === handle)) { setStatus(`@${handle} already tracked`, 'error'); return; }
      state.sources.x_accounts.push({ name, handle, category: 'tech' });
      setDirty(true);
      setStatus(`Added @${handle}`, 'ok');

    document.getElementById('add-tech-rss').addEventListener('click', () => {

      renderAddForm('tech');
    });

  if (tab === 'pt') {
    container.innerHTML = `
      <div class="sub-form active">

      state.sources.rss_feeds.push({ name, url, category: 'pt_news' });
      setDirty(true);
      setStatus(`Added: ${name}`, 'ok');

      renderAddForm('pt');

  if (tab === 'world') {
    container.innerHTML = `
      <div class="sub-form active">
        <div class="field"><label>Feed name</label><input id="world-feed-name" placeholder="Reuters World" autocomplete="off"></div>
        <div class="field"><label>RSS URL</label><input id="world-feed-url" placeholder="https://feeds.reuters.com/…" type="url" autocomplete="off"></div>
        <button id="add-world-rss" class="btn-primary" style="width:100%;justify-content:center">Add Feed</button>
      </div>`;
    document.getElementById('add-world-rss').addEventListener('click', () => {
      const name = document.getElementById('world-feed-name').value.trim();

      state.sources.rss_feeds.push({ name, url, category: 'world_news' });

      setStatus(`Added: ${name}`, 'ok');

}

// ── GitHub API ────────────────────────────────────────────────────
async function loadSources() {
  setStatus('Loading…', 'busy');
  try {
    const res = await fetch(CONTENTS_URL, { headers: { Accept: 'application/vnd.github+json' } });
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    const payload = await res.json();
    state.remoteSha = payload.sha || '';
    state.sources = JSON.parse(atob(payload.content.replace(/\n/g, '')));
    // Ensure arrays exist
    state.sources.x_accounts = state.sources.x_accounts || [];
    state.sources.podcasts    = state.sources.podcasts    || [];
    state.sources.rss_feeds   = state.sources.rss_feeds   || [];
    setStatus('Sources loaded', 'ok');
    setDirty(false);
    renderCurrentTab();
    renderAddForm(state.activeTab);
    updateCounts();
  } catch (e) {
    setStatus(e.message, 'error');
  }
}

async function saveSources() {
  const token = getToken();
  if (!token) { setStatus('Save a GitHub token first', 'error'); return; }
  state.saving = true;
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;
  setStatus('Saving to GitHub…', 'busy');
  try {
    const res = await fetch(CONTENTS_URL, {
      method: 'PUT',
      headers: {
        Accept: 'application/vnd.github+json',
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `sources: update ${new Date().toISOString().slice(0,10)}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(state.sources, null, 2)))),
        sha: state.remoteSha
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `GitHub ${res.status}`);
    }
    const payload = await res.json();
    state.remoteSha = payload.content?.sha || state.remoteSha;
    setDirty(false);
    setStatus('Saved ✓', 'ok');
  } catch (e) {
    setStatus(e.message, 'error');
    btn.textContent = 'Save changes';
    btn.disabled = false;
  } finally {
    state.saving = false;
  }
}

// ── Event wiring ──────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeTab = tab.dataset.tab;
    state.filter = '';
    document.getElementById('search').value = '';
    renderCurrentTab();
    renderAddForm(state.activeTab);
  });
});

document.getElementById('save-token').addEventListener('click', () => {
  const val = document.getElementById('token').value.trim();
  localStorage.setItem(STORAGE_KEY, val);
  setStatus(val ? 'Token saved' : 'Token cleared', 'ok');
});

document.getElementById('clear-token').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('token').value = '';
  setStatus('Token cleared', 'ok');
});

document.getElementById('save-btn').addEventListener('click', saveSources);

document.getElementById('search').addEventListener('input', e => {
  state.filter = e.target.value || '';
  renderCurrentTab();
});

// ── Init ──────────────────────────────────────────────────────────
document.getElementById('token').value = getToken();
loadSources();
</script>
